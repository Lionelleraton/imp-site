<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Body - larger/chunkier than A7C -->
  <rect x="70" y="90" width="340" height="205" rx="16" fill="#2A2E33"/>
  <!-- Top plate -->
  <rect x="70" y="80" width="340" height="30" rx="10" fill="#1E2226"/>
  <rect x="70" y="98" width="340" height="16" fill="#1E2226"/>
  <!-- Grip -->
  <rect x="70" y="90" width="75" height="205" rx="14" fill="#222629"/>
  <!-- Shutter button -->
  <circle cx="198" cy="84" r="10" fill="#444"/>
  <circle cx="198" cy="84" r="6" fill="#555"/>
  <!-- Mode dial left -->
  <circle cx="140" cy="84" r="15" fill="#333"/>
  <!-- Mode dial right -->
  <circle cx="358" cy="84" r="20" fill="#2E3135"/>
  <circle cx="358" cy="84" r="12" fill="#383C41"/>
  <!-- PASM labels (tiny) -->
  <text x="350" y="88" font-family="Helvetica Neue,Arial,sans-serif" font-size="7" fill="#999">P</text>
  <!-- Front lens mount -->
  <circle cx="270" cy="195" r="88" fill="#1A1D20"/>
  <circle cx="270" cy="195" r="81" fill="#222529"/>
  <circle cx="270" cy="195" r="76" fill="none" stroke="#444" stroke-width="2.5"/>
  <circle cx="270" cy="195" r="60" fill="#17181C"/>
  <circle cx="270" cy="195" r="44" fill="#141518"/>
  <circle cx="270" cy="195" r="28" fill="#0D0E10"/>
  <circle cx="270" cy="195" r="13" fill="#090A0C"/>
  <!-- Lens shine -->
  <ellipse cx="256" cy="181" rx="9" ry="6" fill="rgba(137,169,186,0.15)" transform="rotate(-35 256 181)"/>
  <!-- Mount indicator -->
  <circle cx="348" cy="195" r="4.5" fill="#CC2200"/>
  <!-- Sony label -->
  <text x="155" y="130" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="700" fill="#AAAAAA" letter-spacing="3">SONY</text>
  <text x="155" y="146" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#666" letter-spacing="1">α7 IV</text>
  <!-- Back LCD hinge hint -->
  <rect x="396" y="150" width="8" height="80" rx="4" fill="#1A1D20"/>
  <!-- Viewfinder bump -->
  <rect x="175" y="72" width="50" height="18" rx="5" fill="#191C1F"/>
  <!-- Front control dial -->
  <rect x="148" y="108" width="24" height="11" rx="3" fill="#333"/>
  <!-- Bottom bar -->
  <rect x="70" y="280" width="340" height="15" rx="8" fill="#151619"/>
</svg>
