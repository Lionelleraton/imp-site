<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Lens body - wide/compact -->
  <rect x="196" y="75" width="88" height="200" rx="15" fill="#2A2E33"/>
  <!-- Top ring -->
  <rect x="192" y="96" width="96" height="18" rx="4" fill="#1E2226"/>
  <!-- Middle ring -->
  <rect x="192" y="130" width="96" height="14" rx="3" fill="#1A1D20"/>
  <!-- Zoom ring (short travel on wide zoom) -->
  <rect x="182" y="150" width="116" height="52" rx="6" fill="#333"/>
  <!-- Texture lines -->
  <rect x="190" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="198" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="206" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="214" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="222" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="230" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="238" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="246" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="254" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="262" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="270" y="150" width="1.5" height="52" fill="#3D4045"/>
  <rect x="278" y="150" width="1.5" height="52" fill="#3D4045"/>
  <!-- Focus ring -->
  <rect x="192" y="208" width="96" height="28" rx="4" fill="#2E3237"/>
  <!-- Front element - large for wide angle -->
  <circle cx="240" cy="90" r="44" fill="#1A1D20"/>
  <circle cx="240" cy="90" r="39" fill="#1E2024"/>
  <circle cx="240" cy="90" r="33" fill="#15171A"/>
  <circle cx="240" cy="90" r="24" fill="#0E0F11"/>
  <circle cx="240" cy="90" r="13" fill="#090A0C"/>
  <!-- Wide angle glass shimmer -->
  <ellipse cx="228" cy="78" rx="10" ry="6" fill="rgba(137,169,186,0.22)" transform="rotate(-20 228 78)"/>
  <ellipse cx="252" cy="100" rx="5" ry="3" fill="rgba(137,169,186,0.1)" transform="rotate(10 252 100)"/>
  <!-- Rear mount -->
  <circle cx="240" cy="270" r="34" fill="#1A1D20"/>
  <circle cx="240" cy="270" r="28" fill="#15171A"/>
  <circle cx="240" cy="270" r="18" fill="#0E0F11"/>
  <circle cx="240" cy="275" r="38" fill="none" stroke="#555" stroke-width="2.5"/>
  <!-- G-Master badge -->
  <rect x="206" y="128" width="68" height="16" rx="4" fill="#1A1D20"/>
  <text x="240" y="140" font-family="Helvetica Neue,Arial,sans-serif" font-size="7.5" font-weight="700" fill="#AAAAAA" letter-spacing="0.8" text-anchor="middle">G MASTER</text>
  <!-- Label -->
  <text x="240" y="117" font-family="Helvetica Neue,Arial,sans-serif" font-size="7.5" fill="#888" letter-spacing="0.5" text-anchor="middle">FE 16-35mm F2.8</text>
</svg>
