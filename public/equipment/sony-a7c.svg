<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Body -->
  <rect x="80" y="95" width="320" height="195" rx="18" fill="#2A2E33"/>
  <!-- Top plate with mode dial -->
  <rect x="80" y="85" width="320" height="28" rx="10" fill="#1E2226"/>
  <rect x="80" y="95" width="320" height="18" fill="#1E2226"/>
  <!-- Grip -->
  <rect x="80" y="95" width="68" height="195" rx="14" fill="#232730"/>
  <!-- Shutter button -->
  <circle cx="196" cy="88" r="9" fill="#444"/>
  <circle cx="196" cy="88" r="5" fill="#555"/>
  <!-- Top mode dial -->
  <circle cx="345" cy="88" r="18" fill="#333"/>
  <circle cx="345" cy="88" r="10" fill="#3A3A3A"/>
  <!-- Front: lens mount -->
  <circle cx="260" cy="195" r="82" fill="#1A1D20"/>
  <circle cx="260" cy="195" r="75" fill="#222529"/>
  <!-- Lens ring -->
  <circle cx="260" cy="195" r="70" fill="none" stroke="#444" stroke-width="3"/>
  <!-- Lens elements -->
  <circle cx="260" cy="195" r="55" fill="#18191D"/>
  <circle cx="260" cy="195" r="40" fill="#151619"/>
  <circle cx="260" cy="195" r="26" fill="#0E0F11"/>
  <circle cx="260" cy="195" r="12" fill="#0A0B0D"/>
  <!-- Lens shine -->
  <ellipse cx="247" cy="182" rx="8" ry="5" fill="rgba(137,169,186,0.18)" transform="rotate(-30 247 182)"/>
  <!-- Mount indicator dot -->
  <circle cx="335" cy="195" r="4" fill="#CC2200"/>
  <!-- "SONY" label -->
  <text x="163" y="135" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="700" fill="#AAAAAA" letter-spacing="3">SONY</text>
  <!-- A7C label -->
  <text x="163" y="150" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#666" letter-spacing="1">α7C</text>
  <!-- Front dial -->
  <rect x="148" y="102" width="22" height="10" rx="3" fill="#333"/>
  <!-- Viewfinder -->
  <rect x="168" y="79" width="38" height="14" rx="4" fill="#191C1F"/>
  <!-- Flash hotshoe -->
  <rect x="226" y="78" width="55" height="8" rx="2" fill="#2A2E33"/>
  <!-- Card slot indicator -->
  <rect x="356" y="120" width="24" height="16" rx="3" fill="#1A1D20" stroke="#333" stroke-width="1"/>
  <!-- Bottom bar shadow -->
  <rect x="80" y="275" width="320" height="15" rx="10" fill="#151619"/>
</svg>
