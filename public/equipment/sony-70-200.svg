<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Lens body - tall telephoto -->
  <rect x="188" y="28" width="104" height="290" rx="18" fill="#2A2E33"/>
  <!-- Barrel rings -->
  <rect x="184" y="60" width="112" height="22" rx="5" fill="#1E2226"/>
  <rect x="184" y="100" width="112" height="30" rx="5" fill="#222629"/>
  <rect x="184" y="148" width="112" height="18" rx="4" fill="#1A1D20"/>
  <!-- Zoom ring (wider) -->
  <rect x="176" y="170" width="128" height="55" rx="6" fill="#333"/>
  <!-- Zoom ring texture lines -->
  <rect x="184" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="192" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="200" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="208" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="216" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="224" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="232" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="240" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="248" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="256" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="264" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="272" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="280" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="288" y="170" width="1.5" height="55" fill="#3D4045"/>
  <rect x="296" y="170" width="1.5" height="55" fill="#3D4045"/>
  <!-- Focus ring -->
  <rect x="184" y="232" width="112" height="36" rx="5" fill="#2E3237"/>
  <!-- Front element housing -->
  <circle cx="240" cy="52" r="45" fill="#1A1D20"/>
  <circle cx="240" cy="52" r="40" fill="#1E2024"/>
  <circle cx="240" cy="52" r="35" fill="#15171A"/>
  <circle cx="240" cy="52" r="26" fill="#0E0F11"/>
  <circle cx="240" cy="52" r="15" fill="#090A0C"/>
  <!-- Front glass shine -->
  <ellipse cx="230" cy="42" rx="8" ry="5" fill="rgba(137,169,186,0.2)" transform="rotate(-20 230 42)"/>
  <!-- Rear element -->
  <circle cx="240" cy="310" r="38" fill="#1A1D20"/>
  <circle cx="240" cy="310" r="32" fill="#15171A"/>
  <circle cx="240" cy="310" r="22" fill="#0E0F11"/>
  <!-- Mount ring -->
  <circle cx="240" cy="318" r="42" fill="none" stroke="#555" stroke-width="3"/>
  <!-- G-Master badge -->
  <rect x="205" y="148" width="70" height="18" rx="4" fill="#1A1D20"/>
  <text x="240" y="161" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" font-weight="700" fill="#AAAAAA" letter-spacing="1" text-anchor="middle">G MASTER</text>
  <!-- Focal length -->
  <text x="240" y="86" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#888" letter-spacing="0.5" text-anchor="middle">FE 70-200mm F2.8</text>
  <!-- OSS switch -->
  <rect x="185" y="245" width="30" height="10" rx="3" fill="#1E2226"/>
  <text x="200" y="253" font-family="Helvetica Neue,Arial,sans-serif" font-size="5.5" fill="#777" text-anchor="middle">OSS</text>
  <!-- Tripod collar -->
  <rect x="168" y="218" width="144" height="20" rx="5" fill="#222629"/>
</svg>
